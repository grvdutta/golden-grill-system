<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Login — Golden Grill">
  <title>Login — Golden Grill Admin</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-darkest);
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-gold);
      animation: scale-in 0.4s ease-out;
    }
    .login-card__logo {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      text-align: center;
    }
    .login-card__title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      margin-bottom: 32px;
    }
    .login-card__error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      text-align: center;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body class="login-page">

  <div class="login-card">
    <span class="login-card__logo">🔥</span>
    <h1 class="login-card__title">Admin Login</h1>
    
    <div id="login-error" class="login-card__error">Invalid username or password</div>

    <form id="login-form">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="username">Username</label>
        <input type="text" id="username" class="order-form__input" placeholder="Enter username" required>
      </div>
      <div class="form-group" style="margin-bottom: 32px;">
        <label for="password">Password</label>
        <input type="password" id="password" class="order-form__input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn--primary" style="width: 100%; justify-content: center; font-size: 1rem; padding: 14px;">
        Login to Dashboard
      </button>
    </form>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const btn = e.target.querySelector('button');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          // Store session
          localStorage.setItem('isAdminLoggedIn', 'true');
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = result.message || 'Login failed';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login to Dashboard';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorEl.textContent = 'Connection error. Is the server running?';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login to Dashboard';
      }
    });

    // If already logged in, redirect to dashboard
    if (localStorage.getItem('isAdminLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
